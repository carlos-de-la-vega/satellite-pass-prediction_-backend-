<!DOCTYPE html>
<html>
<head>
  <title>Satellite Passes</title>
</head>
<body>

<h1>Satellite Passes</h1>

<button onclick="downloadCSV()">Descargar CSV</button>

<ul id="lista"></ul>

<script>
const API_URL = "https://tu-app.onrender.com";

fetch(API_URL + "/passes")
  .then(res => res.json())
  .then(data => {
    const lista = document.getElementById("lista");

    data.forEach(pass => {
      const li = document.createElement("li");
      li.innerText = `${pass.Satellite} | Rise: ${pass.Rise} | Max Elev: ${pass["Max Elevation (deg)"]}°`;
      lista.appendChild(li);
    });
  });

function downloadCSV() {
  window.open(API_URL + "/download", "_blank");
}
</script>

</body>
</html>
